name: ci nginx
on: 
    push:
        paths:
            - 'nginx.conf'
            - 'apps/backend/static/**'
    pull_request:
        paths:
            - 'nginx.conf'
            - 'apps/backend/static/**'
    workflow_dispatch: 
jobs:
    ci-nginx:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
          - name: Login Docker Hub
            uses: docker/login-action@v3
            with:
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_PASSWORD }}
          - name: Build Nginx Image
            working-directory: .
            run: |
              docker build -f Dockerfile.ntest -t ntkien2311/myapp-nginx:latest .
          - name: Push Nginx Image
            working-directory: .
            run: |
              docker push ntkien2311/myapp-nginx:latest



        