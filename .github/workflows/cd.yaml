name: cd
on:
    workflow_dispatch:
jobs:
    deploy:
        runs-on: self-hosted
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
          - name: Login to Docker Hub
            uses: docker/login-action@v3
            with:
                    username: ${{ secrets.DOCKER_USERNAME }}
                    password: ${{ secrets.DOCKER_PASSWORD }}
          - name: Create Env File
            run: |
                echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
                echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
                echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
                echo "DJANGO_DB_ENGINE=${{ secrets.DJANGO_DB_ENGINE }}" >> .env
                echo "DJANGO_SUPERUSER_USERNAME=${{ secrets.DJANGO_SUPERUSER_USERNAME }}" >> .env
                echo "DJANGO_SUPERUSER_PASSWORD=${{ secrets.DJANGO_SUPERUSER_PASSWORD }}" >> .env
                echo "DJANGO_SUPERUSER_EMAIL=${{ secrets.DJANGO_SUPERUSER_EMAIL }}" >> .env
                echo "FRONTEND_TAG=${{ vars.CURRENT_FRONTEND_TAG }}" >> .env
                echo "BACKEND_TAG=${{ vars.CURRENT_BACKEND_TAG }}" >> .env
          - name: Deploy to Production
            working-directory: .
            run: |
                docker compose -f docker-compose.prod.yaml down --remove-orphans
                docker compose -f docker-compose.prod.yaml up -d --pull always
          - name: Check Docker Container
            working-directory: .
            run: |
              docker ps -a
