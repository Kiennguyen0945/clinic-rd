name: ci backend
env:
  POSTGRES_HOST: ${{ secrets.POSTGRES_HOST_T }}
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
on:
  push:
    branches:
      ["main"]
    paths:
        - 'apps/backend/**'
        - 'apps/docker/backend/Dockerfile.bprod'
  pull_request:
    branches:
      ["main"]
    paths:
        - 'apps/backend/**'
        - 'apps/docker/backend/Dockerfile.bprod'
  workflow_dispatch:
jobs:
  ci-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST_T }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ secrets.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/backend/requirements.txt
      - name: Setup Python && Ruff Check
        working-directory: apps/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
          ruff check .
      - name: Unit Component Test Backend
        working-directory: apps/backend
        env:
            DJANGO_DB_ENGINE: sqlite
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
          python -W error::RuntimeWarning \
                 -W error::DeprecationWarning \
                manage.py test
      - name: Intergration Test
        working-directory: apps/backend
        env:
          DJANGO_DB_ENGINE: postgres
        run: |
          python manage.py check
          python manage.py migrate
          python -W error::RuntimeWarning \
                 -W error::DeprecationWarning \
                manage.py test
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker Image
        working-directory: .
        run: |
          docker build -f apps/docker/backend/Dockerfile.bprod -t ${{ secrets.DOCKER_USERNAME }}/myapp-backend:${{ github.sha }} .
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp-backend:${{ github.sha }}
      - name: Update Backend Tag Variable
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh variable set CURRENT_BACKEND_TAG --body "${{ github.sha }}"
        
