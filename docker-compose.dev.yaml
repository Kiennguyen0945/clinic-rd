services:
  database:
    container_name: clinic_db
    image: postgres:17.10-alpine3.23
    env_file:
      - ./.env
    volumes:
      - postgres_clinic_db:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: ./apps/docker/backend/Dockerfile.bdev
    ports:
      - 8000:8000
    volumes:
      - static_prod:/apps/backend/productionfiles
      - ./apps/backend:/apps/backend
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - ./.env
    entrypoint: ["sh", "/apps/backend/entrypoint.sh"]

  frontend:
      container_name: frontend
      build:
        context: .
        dockerfile: ./apps/docker/frontend/Dockerfile.fdev
      ports:
        - 3000:3000
      volumes:
        - ./apps/frontend:/apps/frontend
  nginx:
      container_name: nginx
      build:
        context: .
        dockerfile: ./apps/docker/nginx/Dockerfile
      ports:
        - 80:80
      volumes:
        - static_prod:/apps/backend/productionfiles
          ./apps/docker/nginx/nginx.dev.conf:/etc/nginx/conf.d/nginx.conf
      depends_on:
        - frontend
        - backend
    
volumes:
 postgres_clinic_db:
 static_prod:
